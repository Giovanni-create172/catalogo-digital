<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
header{background:#111;color:#fff;text-align:center;padding:15px;}

.contenedor{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px;}

.producto{background:#fff;border-radius:10px;overflow:hidden;}
.producto img{width:100%;height:200px;object-fit:cover;}

.info{padding:10px;}
button{margin-top:5px;width:100%;padding:6px;border:none;border-radius:6px;}

#carrito{position:fixed;right:-100%;top:0;width:300px;height:100%;background:#fff;transition:.3s;padding:10px;}
#carrito.active{right:0;}

#carritoBtn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:20px;}

#admin,#ventas{display:none;padding:10px;background:white;margin:10px;border-radius:10px;}
.card{background:black;color:white;padding:8px;margin:5px 0;border-radius:8px;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<div id="admin">
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<input id="stock" placeholder="Stock">
<button onclick="agregar()">Agregar</button>
</div>

<div id="ventas">
<h3>Dashboard</h3>
<div id="resumen"></div>
<div id="listaVentas"></div>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒</div>

<div id="carrito">
<button onclick="toggleCarrito()">Cerrar</button>
<div id="items"></div>
<div id="total">Total: $0</div>
<button onclick="pagar()">Comprar</button>
</div>

<div class="contenedor" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db=getFirestore(app);

let productos=[];
let carrito=[];

/* ADMIN */
if(new URLSearchParams(location.search).get("admin")==="1234"){
document.getElementById("admin").style.display="block";
document.getElementById("ventas").style.display="block";
}

/* AGREGAR */
window.agregar=async()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value),
imagen:imagen.value,
stock:Number(stock.value)
});
}

/* MOSTRAR PRODUCTOS */
onSnapshot(collection(db,"productos"),snap=>{
productos=[];
snap.forEach(d=>{
productos.push({id:d.id,...d.data()});
});
mostrar();
});

function mostrar(){
const cont=document.getElementById("lista");
cont.innerHTML="";

productos.forEach(p=>{
cont.innerHTML+=`
<div class="producto">
<img src="${p.imagen}">
<div class="info">
<b>${p.nombre}</b>
<p>$${p.precio}</p>
<p>Stock: ${p.stock}</p>
<button onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>
<button onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">WhatsApp</button>
</div>
</div>`;
});
}

/* CARRITO */
window.agregarCarrito=p=>{
let e=carrito.find(x=>x.id===p.id);
if(e){e.cantidad++}else{p.cantidad=1;carrito.push(p);}
render();
}

function render(){
let items=document.getElementById("items");
let total=0;
items.innerHTML="";

carrito.forEach((p,i)=>{
total+=p.precio*p.cantidad;
items.innerHTML+=`
<div>
${p.nombre} x${p.cantidad}
<button onclick="cambiar(${i},-1)">-</button>
<button onclick="cambiar(${i},1)">+</button>
<button onclick="eliminar(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
}

window.cambiar=(i,v)=>{
let p=carrito[i];
if(p.cantidad+v<=0)return;
p.cantidad+=v;
render();
}

window.eliminar=i=>{
carrito.splice(i,1);
render();
}

window.toggleCarrito=()=>{
document.getElementById("carrito").classList.toggle("active");
}

/* PAGAR */
window.pagar=async()=>{
if(carrito.length===0)return;

await addDoc(collection(db,"ventas"),{
productos:carrito.map(p=>({nombre:p.nombre,cantidad:p.cantidad})),
total:parseFloat(document.getElementById("total").innerText.replace("Total: $","")),
fecha:new Date().toLocaleString()
});

for(let p of carrito){
await updateDoc(doc(db,"productos",p.id),{
stock:p.stock-p.cantidad
});
}

window.open("https://wa.me/573187446036?text=Pedido realizado");

carrito=[];
render();
}

/* DASHBOARD */
onSnapshot(collection(db,"ventas"),snap=>{
let total=0,pedidos=0,conteo={};

let lista=document.getElementById("listaVentas");
lista.innerHTML="";

snap.forEach(d=>{
let v=d.data();
total+=v.total;
pedidos++;

v.productos.forEach(p=>{
conteo[p.nombre]=(conteo[p.nombre]||0)+p.cantidad;
});

lista.innerHTML+=`<div>${v.fecha} - $${v.total}</div>`;
});

let top="Ninguno",max=0;
for(let k in conteo){
if(conteo[k]>max){max=conteo[k];top=k;}
}

document.getElementById("resumen").innerHTML=`
<div class="card">Total: $${total}</div>
<div class="card">Pedidos: ${pedidos}</div>
<div class="card">Top: ${top}</div>
`;
});

</script>

</body>
</html>
