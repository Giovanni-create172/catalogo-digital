 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encanto Ventas Pasto</title>

<style>
.itemCarrito{
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.infoCarrito b{
font-size:14px;
}

.infoCarrito p{
margin:0;
font-size:13px;
color:#555;
}

.accionesCarrito button{
margin-left:5px;
padding:5px 8px;
border-radius:6px;
border:none;
cursor:pointer;
}

.accionesCarrito button:nth-child(1){background:#e2e8f0;}
.accionesCarrito button:nth-child(2){background:#38bdf8;color:white;}
.accionesCarrito button:nth-child(3){background:#ef4444;color:white;} 
#noti{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:14px;
display:none;
z-index:9999;
animation:fadeIn .5s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}  
body{margin:0;font-family:'Segoe UI';background:#f1f5f9;overflow-x:hidden;}
header{
background:#0f172a;color:white;text-align:center;
padding:15px;font-size:20px;
display:flex;justify-content:center;align-items:center;gap:10px;
}
header img{width:40px;height:40px;border-radius:50%;object-fit:cover;}

#buscador{width:95%;margin:10px auto;display:block;padding:12px;border-radius:12px;border:1px solid #ccc;font-size:16px;}

#filtros{display:flex;gap:10px;overflow:auto;padding:10px;}
.filtroBtn{padding:8px 14px;background:#e2e8f0;border-radius:20px;cursor:pointer;white-space:nowrap;}
.filtroBtn.active{background:black;color:white;}

.contenedor{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px;}
.categoriaTitulo{padding:10px;font-weight:bold;font-size:18px;}

.producto{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}
.precio{color:red;font-weight:bold;}

button{width:100%;margin-top:5px;padding:8px;border:none;border-radius:8px;cursor:pointer;}
.add{background:orange;}
.wa{background:green;color:white;}
.agotado{background:gray;color:white;}
.eliminar{background:red;color:white;}

#carritoBtn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:12px;border-radius:25px;}
#carrito{position:fixed;right:-100%;top:0;width:300px;height:100%;background:white;padding:10px;transition:.3s;overflow:auto;}
#carrito.active{right:0;}

.total{font-weight:bold;margin-top:10px;}

#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
#modal img{max-width:90%;max-height:90%;}

#admin{display:none;background:white;margin:10px;padding:10px;border-radius:10px;}

#reseñas{background:white;margin:20px;padding:15px;border-radius:12px;}
.res{border-bottom:1px solid #eee;padding:5px 0;}
#infoTienda{
background:white;
margin:20px;
padding:15px;
border-radius:12px;
display:flex;
justify-content:space-around;
align-items:center;
gap:10px;
text-align:center;
font-size:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex-wrap:wrap;
}

.itemInfo{
padding:8px 12px;
background:#f8fafc;
border-radius:20px;
display:inline-block;
}

.itemInfo{
padding:8px;
background:#f8fafc;
border-radius:8px;
}
#redes{background:#0f172a;color:white;padding:20px;text-align:center;}
.redBtns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
.redBtns a{padding:10px 15px;border-radius:20px;color:white;text-decoration:none;font-weight:bold;}
.fb{background:#1877f2;}
.ig{background:#e1306c;}
.waBtn{background:#25d366;}
.tk{background:black;}
 #contadorCarrito{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
margin-left:5px;
} 
</style>
</head>
<div id="noti"></div>
<body>

<header>
<img src="https://raw.githubusercontent.com/Giovanni-create172/catalogo-digital/main/logo.png">
<span>Encanto Ventas Pasto</span>
</header>

<input id="buscador" placeholder="Buscar productos..." onkeyup="filtrar()">

<div id="filtros"></div>

<div id="admin">
<h3>Agregar producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<input id="descripcion" placeholder="Descripción">
<input id="stock" placeholder="Stock">
<select id="categoria">
  <option value="Ropa">Ropa</option>
  <option value="Zapatos">Zapatos</option>
  <option value="Accesorios">Accesorios</option>
  <option value="Tecnología">Tecnología</option>
  <option value="Bolsos">Bolsos</option>
  <option value="Ofertas">Ofertas</option>
  <option value="Otros">Otros</option>
</select>
<button onclick="agregar()">Agregar</button>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>
<div id="carrito">
<button onclick="toggleCarrito()">Cerrar</button>
<div id="items"></div>
<div class="total" id="total">Total: $0</div>
<button onclick="pagar()">Finalizar compra</button>
</div>

<div id="lista"></div>

<div id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<div id="reseñas">
<h3>⭐ Opiniones</h3>
<div id="listaReseñas"></div>
<input id="nombreReseña" placeholder="Tu nombre">
<input id="textoReseña" placeholder="Comentario">
<button onclick="agregarReseña()">Enviar</button>
</div>

<div id="redes">
<h3>Síguenos</h3>
<div class="redBtns">
<a class="fb" href="https://www.facebook.com/EncantoVentasPasto" target="_blank">Facebook</a>
<a class="ig" href="https://www.instagram.com/EncantoVentasPasto" target="_blank">Instagram</a>
<a class="waBtn" href="https://wa.me/573187446036" target="_blank">WhatsApp</a>
<a class="tk" href="https://www.tiktok.com/@EncantoventasPasto" target="_blank">TikTok</a>
</div>
</div>
<div id="infoTienda">
  <div class="itemInfo">🚚 Envíos nacionales seguros</div>
  <div class="itemInfo">🔒 Compra 100% segura</div>
  <div class="itemInfo">📦 Entregas rápidas</div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db = getFirestore(app);

let productos = [];
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let categoriaActiva="Todas";

let esAdmin = new URLSearchParams(location.search).get("admin")==="1234";
if(esAdmin) document.getElementById("admin").style.display="block";

window.agregar = async ()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value),
imagen:imagen.value,
descripcion:descripcion.value,
stock:Number(stock.value),
categoria: categoria.value.trim()
});
}

window.eliminarProducto = async (id)=>{
if(!confirm("Eliminar producto?")) return;
await deleteDoc(doc(db,"productos",id));
}

onSnapshot(collection(db,"productos"),(snap)=>{
productos=[];
snap.forEach(d=>productos.push({id:d.id,...d.data()}));
crearFiltros();
mostrar(productos);
renderCarrito();
});

function crearFiltros(){
let cats=["Todas"];

productos.forEach(p=>{
let c = (p.categoria || "General").trim();
if(!cats.includes(c)) cats.push(c);
});

/* 👇 NUEVO: ordenar */
cats = ["Todas", ...cats.slice(1).sort()];
filtros.innerHTML="";
cats.forEach(c=>{
filtros.innerHTML+=`<div class="filtroBtn ${c===categoriaActiva?'active':''}" onclick="filtrarCategoria('${c}')">${c}</div>`;
});
}

window.filtrarCategoria=(c)=>{
categoriaActiva=c;
crearFiltros();
if(c==="Todas") mostrar(productos);
else mostrar(productos.filter(p=>p.categoria===c));
}

function mostrar(listaMostrar){
const cont=document.getElementById("lista");
cont.innerHTML="";
let grupos={};

listaMostrar.forEach(p=>{
let cat=p.categoria||"General";
if(!grupos[cat]) grupos[cat]=[];
grupos[cat].push(p);
});

Object.keys(grupos).forEach(cat=>{
cont.innerHTML+=`<div class="categoriaTitulo">📦 ${cat}</div><div class="contenedor">`;

grupos[cat].forEach(p=>{
let i=productos.findIndex(x=>x.id===p.id);

let boton=p.stock<=0
? `<button class="agotado">AGOTADO</button>`
: `<button class="add" onclick="agregarCarrito(${i})">Agregar</button>`;

let eliminarBtn=esAdmin
? `<button class="eliminar" onclick="eliminarProducto('${p.id}')">Eliminar</button>`:"";

cont.innerHTML+=`
<div class="producto">
<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
<div class="info">
<b>${p.nombre}</b>
<p class="precio">$${p.precio}</p>
<p>${p.descripcion||""}</p>
<p>Stock: ${p.stock}</p>
<p style="color:#2563eb;font-size:13px;">
👀 ${Math.floor(Math.random()*10)+1} personas viendo
</p>
${boton}
<button class="wa" onclick="whatsapp(${i})">WhatsApp</button>
${eliminarBtn}
</div></div>`;
});

cont.innerHTML+=`</div>`;
});
}

window.filtrar=()=>{
let t=buscador.value.toLowerCase();
mostrar(productos.filter(p=>
(p.nombre||"").toLowerCase().includes(t)||
(p.descripcion||"").toLowerCase().includes(t)||
(p.categoria||"").toLowerCase().includes(t)
));
}

window.verImagen=(u)=>{modal.style.display="flex";imgModal.src=u;}
window.cerrarModal=()=>modal.style.display="none";

window.agregarCarrito=(i)=>{
let p=productos[i]; if(p.stock<=0) return;
let e=carrito.find(x=>x.id===p.id);
if(e){ if(e.cantidad<p.stock) e.cantidad++; else return alert("Sin stock"); }
else carrito.push({...p,cantidad:1});
guardarCarrito(); renderCarrito();
}

function renderCarrito(){
let items=document.getElementById("items");
let total=0; items.innerHTML="";
carrito.forEach((p,i)=>{
total+=p.precio*p.cantidad;
items.innerHTML += `
<div class="itemCarrito">
  <div class="infoCarrito">
    <b>${p.nombre}</b>
    <p>$${p.precio} x ${p.cantidad}</p>
  </div>

  <div class="accionesCarrito">
    <button onclick="cambiar(${i},-1)">➖</button>
    <button onclick="cambiar(${i},1)">➕</button>
    <button onclick="eliminar(${i})">❌</button>
  </div>
</div>`;
});
document.getElementById("total").innerText="Total: $"+total;
let totalCantidad = carrito.reduce((acc,p)=>acc+p.cantidad,0);
document.getElementById("contadorCarrito").innerText = totalCantidad;  
}

function guardarCarrito(){localStorage.setItem("carrito",JSON.stringify(carrito));}

window.cambiar=(i,v)=>{
let p=carrito[i];
if(p.cantidad+v<=0)return;
if(p.cantidad+v>p.stock)return alert("Stock máximo");
p.cantidad+=v;guardarCarrito();renderCarrito();
}

window.eliminar=i=>{carrito.splice(i,1);guardarCarrito();renderCarrito();}
window.toggleCarrito=()=>document.getElementById("carrito").classList.toggle("active");

window.whatsapp = (i)=>{
let p = productos[i];

let imagen = p.imagen ? p.imagen : "No disponible";

let msg = `Hola 👋
Quiero este producto:

🛍 ${p.nombre}
💰 $${p.precio}

🖼 Imagen:
${imagen}
`;

window.open("https://wa.me/573187446036?text="+encodeURIComponent(msg));
}

window.pagar=async()=>{
if(carrito.length===0)return alert("Carrito vacío");
let total=document.getElementById("total").innerText;

let msg="Hola 👋 quiero comprar:\n\n";
carrito.forEach(p=>{
msg += `🛍 ${p.nombre} x${p.cantidad}
💰 $${p.precio}

🖼 ${p.imagen}

`;
});
msg+="\n"+total+"\n\nPago por Nequi: 3187446036";

await addDoc(collection(db,"ventas"),{
productos:carrito.map(p=>({nombre:p.nombre,cantidad:p.cantidad})),
total:parseFloat(total.replace("Total: $","")),
fecha:new Date().toLocaleString()
});

for(let p of carrito){
await updateDoc(doc(db,"productos",p.id),{stock:p.stock-p.cantidad});
}

window.open("https://wa.me/573187446036?text="+encodeURIComponent(msg));

carrito=[];guardarCarrito();renderCarrito();
}

window.agregarReseña=async()=>{
await addDoc(collection(db,"reseñas"),{nombre:nombreReseña.value,texto:textoReseña.value});
}

onSnapshot(collection(db,"reseñas"),(snap)=>{
listaReseñas.innerHTML="";
snap.forEach(doc=>{
let r=doc.data();
listaReseñas.innerHTML+=`<div class="res"><b>${r.nombre}</b><br>${r.texto}</div>`;
});
});
const nombres = ["Ana","Carlos","Luis","María","Andrés","Sofía","Juan","Camila"];

function mostrarNotificacion(){

let nombre = nombres[Math.floor(Math.random()*nombres.length)];
let minutos = Math.floor(Math.random()*10)+1;

let producto = productos[Math.floor(Math.random()*productos.length)];

let texto = `🛍 ${nombre} compró ${producto.nombre} hace ${minutos} min`;

let box = document.getElementById("noti");
box.innerText = texto;
box.style.display = "block";

setTimeout(()=>{
box.style.display="none";
},4000);
}

setInterval(mostrarNotificacion, 8000);
</script>
</body>
</html>
