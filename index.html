 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body { font-family: Arial; background:#eef1f5; margin:0; }

header {
  background:#0a66c2;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

header h1 {
  font-size:20px;
  margin:0;
}

.formulario {
  background:white;
  padding:15px;
  margin:20px;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  border:none;
  border-radius:5px;
  color:white;
  width:100%;
  margin-top:5px;
  cursor:pointer;
}

.guardar { background:green; }
.eliminar { background:red; }
.whatsapp { background:#25d366; }
.carritoBtn { background:#ff9800; }

.filtros {
  padding:10px;
  text-align:center;
}

.contenedor {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

.producto {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.producto img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.info { padding:10px; }

.precio { color:#0a66c2; font-weight:bold; }

#carrito {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: white;
  width: 260px;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  display: none;
  z-index: 1000;
}

.itemCarrito {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
  font-size:14px;
}

.btnEliminar {
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  padding:2px 6px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Encanto Ventas Pasto</h1>
</header>

<div class="contenedor" id="listaProductos"></div>

<!-- carrito -->
<div id="carrito">
  <h3>Carrito</h3>
  <div id="itemsCarrito"></div>
  <p id="total"></p>
  <button class="whatsapp" onclick="enviarPedido()">Enviar pedido</button>
</div>

<!-- botón carrito -->
<button onclick="toggleCarrito()"
style="position:fixed;bottom:20px;left:20px;width:60px;height:60px;border-radius:50%;background:#ff9800;">
🛒
</button>

<!-- botón whatsapp -->
<a href="https://wa.me/573187446036?text=Hola"
style="position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:#25d366;color:white;border-radius:50%;display:flex;justify-content:center;align-items:center;text-decoration:none;font-size:30px;">
💬
</a>

<script>
let carrito = [];

let productos = [
  {nombre:"Producto demo", precio:10000},
  {nombre:"Producto 2", precio:20000}
];

function mostrar() {
  let cont = document.getElementById("listaProductos");
  cont.innerHTML = "";

  productos.forEach((p, i) => {
    cont.innerHTML += `
      <div class="producto">
        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button onclick="agregar('${p.nombre}', ${p.precio})"
          class="whatsapp">
          Agregar al carrito
          </button>
        </div>
      </div>
    `;
  });
}

function agregar(nombre, precio) {
  carrito.push({nombre, precio});
  actualizar();
}

function eliminar(index) {
  carrito.splice(index, 1);
  actualizar();
}

function actualizar() {
  let cont = document.getElementById("itemsCarrito");
  let total = 0;

  cont.innerHTML = "";

  carrito.forEach((p, i) => {
    total += p.precio;

    cont.innerHTML += `
      <div class="itemCarrito">
        <span>${p.nombre} - $${p.precio}</span>
        <button class="btnEliminar" onclick="eliminar(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total;
}

function toggleCarrito() {
  let c = document.getElementById("carrito");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

function enviarPedido() {
  let texto = "Hola quiero comprar:\n";
  carrito.forEach(p => {
    texto += `- ${p.nombre} $${p.precio}\n`;
  });

  window.open("https://wa.me/573187446036?text=" + encodeURIComponent(texto));
}

mostrar();
</script>

</body>
</html>
