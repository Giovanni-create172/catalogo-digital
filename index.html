<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

header{
  background:#111827;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

/* PRODUCTOS */
.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.info{
  padding:10px;
}

.precio{
  color:#b12704;
  font-weight:bold;
}

/* BOTONES */
button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:#f59e0b;}
.wa{background:#25d366;color:white;}

/* ADMIN */
#adminPanel{
  display:none;
  background:white;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

/* NEQUI */
#nequiBox{
  display:none;
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* CARRITO */
#carrito{
  position:fixed;
  right:20px;
  bottom:90px;
  width:280px;
  background:white;
  padding:10px;
  border-radius:10px;
  display:none;
}

/* MODAL IMAGEN */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* BOTONES FLOTANTES */
#cartBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#f59e0b;
  font-size:26px;
}

.flotante-wa{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h3>🛠 Admin</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">

  <!-- 🔥 ESTO ES LO IMPORTANTE -->
  <input type="file" id="imgFile">

  <button onclick="agregarProducto()" style="background:#111;color:white;">
    Agregar producto
  </button>

  <button onclick="mostrarNequi()">💳 Nequi</button>
</div>

<!-- NEQUI -->
<div id="nequiBox">
  <h3>💳 Nequi</h3>
  <p>318 744 6036</p>
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito"></div>

<button id="cartBtn" onclick="toggleCarrito()">🛒</button>

<!-- WHATSAPP -->
<a class="flotante-wa" href="https://wa.me/573187446036">💬</a>

<!-- MODAL IMAGEN -->
<div id="modal" onclick="cerrarModal()">
  <img id="imgGrande">
</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = [];

/* ADMIN SOLO SI ?admin=1234 */
if(new URLSearchParams(location.search).get("admin") === "1234"){
  document.getElementById("adminPanel").style.display = "block";
}

/* AGREGAR PRODUCTO (CON IMAGEN REAL) */
function agregarProducto(){

  let file = document.getElementById("imgFile").files[0];

  let reader = new FileReader();

  reader.onload = function(e){

    productos.push({
      nombre:nombre.value,
      precio:precio.value,
      img:e.target.result
    });

    localStorage.setItem("productos", JSON.stringify(productos));
    render();
  };

  reader.readAsDataURL(file);
}

/* NEQUI */
function mostrarNequi(){
  let b = document.getElementById("nequiBox");
  b.style.display = (b.style.display === "block") ? "none" : "block";
}

/* CARRITO */
function agregarCarrito(i){
  carrito.push(productos[i]);
}

/* TOGGLE */
function toggleCarrito(){
  let c = document.getElementById("carrito");
  c.style.display = (c.style.display === "block") ? "none" : "block";
  actualizar();
}

/* ACTUALIZAR CARRITO */
function actualizar(){
  let c = document.getElementById("carrito");
  c.innerHTML = "<h3>Carrito</h3>";

  carrito.forEach(p=>{
    c.innerHTML += `<div>${p.nombre} - $${p.precio}</div>`;
  });
}

/* ZOOM IMAGEN */
function abrirModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgGrande").src=src;
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

/* RENDER */
function render(){

  let cont = document.getElementById("lista");
  cont.innerHTML = "";

  productos.forEach((p,i)=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}" onclick="abrirModal('${p.img}')">

        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick="agregarCarrito(${i})">
            Agregar
          </button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=' + encodeURIComponent('Quiero: ${p.nombre}'))">
            WhatsApp
          </button>
        </div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
