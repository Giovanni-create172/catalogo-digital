<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Catálogo</title>

  <style>
    body {
      font-family: Arial;
      background: #eef1f5;
      margin: 0;
    }

    header {
      background: #0a66c2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .formulario {
      background: white;
      padding: 15px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      width: 100%;
      margin-top: 5px;
    }

    .guardar { background: #28a745; }
    .eliminar { background: #dc3545; }
    .whatsapp { background: #25d366; }

    .contenedor {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .producto {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .producto img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      cursor: pointer;
    }

    .info {
      padding: 10px;
    }

    .precio {
      color: #0a66c2;
      font-weight: bold;
      font-size: 18px;
    }

    /* MODAL */
    #modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #modal img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<header>Mi Catálogo</header>

<div class="formulario">
  <input type="text" id="nombre" placeholder="Nombre del producto">
  <input type="number" id="precio" placeholder="Precio">
  <input type="file" id="imagenInput" accept="image/*">
  <button class="guardar" onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="contenedor" id="listaProductos"></div>

<div id="modal">
  <img id="imagenGrande">
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC23m8avf3Z",
    authDomain: "catalogo-digital-4a956.firebaseapp.com",
    projectId: "catalogo-digital-4a956",
    storageBucket: "catalogo-digital-4a956.firebasestorage.app",
    messagingSenderId: "78408824293",
    appId: "1:78408824293:web:4aafa762fc4e9e5267eb0c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const lista = document.getElementById("listaProductos");
  const telefono = "573187446036"; // tu número

  async function guardarProducto() {
    let nombre = document.getElementById("nombre").value;
    let precio = document.getElementById("precio").value;
    let file = document.getElementById("imagenInput").files[0];

    if (!nombre || !precio || !file) {
      alert("Completa todo");
      return;
    }

    let reader = new FileReader();

    reader.onload = async function(e) {
      await addDoc(collection(db, "productos"), {
        nombre,
        precio,
        imagen: e.target.result
      });

      mostrarProductos();
    };

    reader.readAsDataURL(file);
  }

  async function eliminarProducto(id) {
    await deleteDoc(doc(db, "productos", id));
    mostrarProductos();
  }

  async function mostrarProductos() {
    lista.innerHTML = "";
    const datos = await getDocs(collection(db, "productos"));

    datos.forEach((docu) => {
      let p = docu.data();

      let mensaje = encodeURIComponent(
        `Hola, quiero este producto: ${p.nombre} - $${p.precio}`
      );

      lista.innerHTML += `
        <div class="producto">
          <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
          <div class="info">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio}</p>
            <button class="whatsapp" onclick="window.open('https://wa.me/${telefono}?text=${mensaje}')">
              Comprar por WhatsApp
            </button>
            <button class="eliminar" onclick="eliminarProducto('${docu.id}')">
              Eliminar
            </button>
          </div>
        </div>
      `;
    });
  }

  function verImagen(src) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imagenGrande").src = src;
  }

  document.getElementById("modal").onclick = () => {
    document.getElementById("modal").style.display = "none";
  };

  window.guardarProducto = guardarProducto;
  window.eliminarProducto = eliminarProducto;
  window.verImagen = verImagen;

  mostrarProductos();
</script>

</body>
</html>
