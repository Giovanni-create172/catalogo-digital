 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f1f5f9;}
header{background:#0f172a;color:white;text-align:center;padding:15px;}

#buscador{margin:10px;padding:10px;width:95%;}

#categorias{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.cat{padding:6px 12px;background:#ddd;border-radius:20px;cursor:pointer;}
.cat.activa{background:#111827;color:white;}

.contenedor{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px;}

.producto{background:white;border-radius:12px;overflow:hidden;}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}
.precio{color:red;font-weight:bold;}
.stock{color:green;font-size:13px;}

button{width:100%;margin-top:5px;padding:8px;border:none;border-radius:8px;cursor:pointer;}
.add{background:orange;}
.wa{background:green;color:white;}
.del{background:red;color:white;}

#carritoBtn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:20px;}

#carrito{position:fixed;right:-100%;top:0;width:300px;height:100%;background:white;padding:10px;transition:.3s;}
#carrito.active{right:0;}

.total{
  font-weight:bold;
  margin-top:10px;
  font-size:18px;
}

#admin{display:none;background:white;margin:10px;padding:10px;}

#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
#modal img{max-width:90%;max-height:90%;}

</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<input id="buscador" placeholder="Buscar..." onkeyup="filtrar()">

<div id="categorias"></div>

<div id="admin">
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<input id="descripcion" placeholder="Descripción">
<input id="talla" placeholder="Talla">
<input id="color" placeholder="Color">
<input id="categoria" placeholder="Categoría">
<input id="stock" placeholder="Stock">
<button onclick="agregar()">Agregar</button>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒 (0)</div>

<div id="carrito">
<button onclick="toggleCarrito()">Cerrar</button>
<h3>Carrito</h3>
<div id="items"></div>

<div class="total" id="total">Total: $0</div>

<button class="wa" onclick="enviarPedido()">Enviar pedido</button>
</div>

<div class="contenedor" id="lista"></div>

<div id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db=getFirestore(app);

let productos=[];
let carrito=[];
let categoriaActiva="";

/* 🟢 CARGAR CARRITO GUARDADO */
if(localStorage.getItem("carrito")){
  carrito = JSON.parse(localStorage.getItem("carrito"));
}

/* ADMIN */
if(new URLSearchParams(location.search).get("admin")==="1234"){
document.getElementById("admin").style.display="block";
}

/* AGREGAR */
window.agregar=async()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:precio.value,
imagen:imagen.value,
descripcion:descripcion.value,
talla:talla.value,
color:color.value,
categoria:categoria.value,
stock:parseInt(stock.value)||0
});
}

/* CARGAR */
onSnapshot(collection(db,"productos"),(snap)=>{
productos=[];
let cats=new Set();

snap.forEach(doc=>{
let p=doc.data();
productos.push(p);
if(p.categoria)cats.add(p.categoria);
});

crearCategorias([...cats]);
mostrar(productos);
});

/* CATEGORÍAS */
function crearCategorias(lista){
let cont=document.getElementById("categorias");
cont.innerHTML=`<div class="cat activa" onclick="filtrarCategoria('')">Todos</div>`;
lista.forEach(c=>{
cont.innerHTML+=`<div class="cat" onclick="filtrarCategoria('${c}')">${c}</div>`;
});
}

/* MOSTRAR */
function mostrar(lista){
let cont=document.getElementById("lista");
cont.innerHTML="";

lista.forEach(p=>{
cont.innerHTML+=`
<div class="producto">
<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
<div class="info">
<b>${p.nombre}</b>
<p class="precio">$${p.precio}</p>
<p>${p.descripcion||""}</p>
<p class="stock">Stock: ${p.stock||0}</p>

<button class="add" onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>
<button class="wa" onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">WhatsApp</button>
</div>
</div>
`;
});
}

/* MODAL */
window.verImagen=(url)=>{
modal.style.display="flex";
imgModal.src=url;
}
window.cerrarModal=()=>{
modal.style.display="none";
}

/* FILTRO */
window.filtrar=()=>{
let t=buscador.value.toLowerCase();
let f=productos.filter(p=>p.nombre.toLowerCase().includes(t));
if(categoriaActiva){
f=f.filter(p=>p.categoria===categoriaActiva);
}
mostrar(f);
}

window.filtrarCategoria=(cat)=>{
categoriaActiva=cat;
filtrar();
}

/* 🛒 CARRITO */
window.agregarCarrito=(p)=>{
if(p.stock<=0){alert("Sin stock");return;}

p.stock--;
carrito.push(p);

guardarCarrito();
renderCarrito();

document.getElementById("carrito").classList.add("active");
}

function renderCarrito(){
items.innerHTML="";
let total=0;

carrito.forEach((p,i)=>{
total+=parseFloat(p.precio)||0;

let d=document.createElement("div");
d.innerHTML=`<p>${p.nombre} - $${p.precio}</p><button class="del">Quitar</button>`;
d.querySelector("button").onclick=()=>eliminar(i);

items.appendChild(d);
});

document.getElementById("total").innerText="Total: $"+total;
carritoBtn.innerText="🛒 ("+carrito.length+")";
}

/* GUARDAR */
function guardarCarrito(){
localStorage.setItem("carrito", JSON.stringify(carrito));
}

window.eliminar=(i)=>{
carrito.splice(i,1);
guardarCarrito();
renderCarrito();
}

window.toggleCarrito=()=>{
document.getElementById("carrito").classList.toggle("active");
}

window.enviarPedido=()=>{
let txt="Hola quiero:\n";
carrito.forEach(p=>txt+=p.nombre+" - $"+p.precio+"\n");

let total=document.getElementById("total").innerText;
txt+="\n"+total;

window.open("https://wa.me/573187446036?text="+encodeURIComponent(txt));
}

/* 🟢 MOSTRAR CARRITO AL INICIAR */
renderCarrito();

</script>

</body>
</html>
