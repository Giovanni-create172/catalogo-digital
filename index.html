<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111827;color:white;text-align:center;padding:15px;font-weight:bold;}

#buscador{
  margin:10px;
  padding:10px;
  width:calc(100% - 40px);
  border-radius:8px;
  border:1px solid #ccc;
}

#admin{
  display:none;
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{background:white;border-radius:12px;}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}
.precio{color:#b12704;font-weight:bold;}
.detalle{font-size:13px;color:#555;}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{background:#f59e0b;}
.wa{background:#25d366;color:white;}
.del{background:#ef4444;color:white;}

#carritoBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  color:white;
  padding:10px;
  border-radius:20px;
}

#carrito{
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
  overflow:auto;
}
#carrito.active{right:0;}

#reseñas{
  background:white;
  margin:20px;
  padding:15px;
  border-radius:10px;
}
.res{border-bottom:1px solid #eee;padding:8px 0;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<input id="buscador" placeholder="🔍 Buscar producto..." onkeyup="filtrar()">

<!-- ADMIN -->
<div id="admin">
  <h3>Admin</h3>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="precio" placeholder="Precio"><br>
  <input id="imagen" placeholder="URL imagen"><br>
  <input id="descripcion" placeholder="Descripción"><br>
  <input id="talla" placeholder="Talla"><br>
  <input id="color" placeholder="Color"><br>
  <button onclick="agregar()">Agregar producto</button>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒 (0)</div>

<div id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h3>Carrito</h3>
  <div id="items"></div>
  <button class="wa" onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<div class="contenedor" id="lista"></div>

<!-- RESEÑAS -->
<div id="reseñas">
  <h3>⭐ Opiniones</h3>
  <div id="listaReseñas"></div>

  <input id="nombreReseña" placeholder="Tu nombre">
  <input id="textoReseña" placeholder="Tu opinión">
  <button onclick="agregarReseña()">Enviar reseña</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy",
  authDomain:"catalogo-digital-4a956.firebaseapp.com",
  projectId:"catalogo-digital-4a956"
});

const db = getFirestore(app);

let productos=[];
let carrito=[];

/* ADMIN */
const esAdmin = new URLSearchParams(location.search).get("admin")==="1234";
if(esAdmin){
  document.getElementById("admin").style.display="block";
}

/* AGREGAR */
window.agregar = async ()=>{
  await addDoc(collection(db,"productos"),{
    nombre:nombre.value,
    precio:precio.value,
    imagen:imagen.value,
    descripcion:descripcion.value,
    talla:talla.value,
    color:color.value
  });
}

/* MOSTRAR */
onSnapshot(collection(db,"productos"),(snap)=>{
  productos=[];
  snap.forEach(doc=>productos.push(doc.data()));
  mostrar(productos);
});

function mostrar(lista){
  let cont=document.getElementById("lista");
  cont.innerHTML="";

  lista.forEach(p=>{
    cont.innerHTML+=`
      <div class="producto">
        <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
        <div class="info">
          <b>${p.nombre}</b>
          <p class="precio">$${p.precio}</p>

          <p class="detalle">${p.descripcion || ""}</p>
          <p class="detalle">Talla: ${p.talla || ""}</p>
          <p class="detalle">Color: ${p.color || ""}</p>

          <button class="add" onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">
          WhatsApp</button>
        </div>
      </div>
    `;
  });
}

/* BUSCADOR */
window.filtrar=()=>{
  let t=document.getElementById("buscador").value.toLowerCase();
  mostrar(productos.filter(p=>p.nombre.toLowerCase().includes(t)));
}

/* 🛒 CARRITO (ARREGLADO REAL) */
window.agregarCarrito = (p) => {
  carrito.push(p);
  renderCarrito();
  document.getElementById("carrito").classList.add("active");
}

function renderCarrito(){
  const cont = document.getElementById("items");
  cont.innerHTML = "";

  if(carrito.length === 0){
    cont.innerHTML = "<p>Carrito vacío</p>";
  } else {
    carrito.forEach((p,i)=>{
      const div = document.createElement("div");

      div.innerHTML = `
        <p>${p.nombre} - $${p.precio}</p>
        <button class="del">Quitar</button>
      `;

      div.querySelector("button").onclick = () => eliminar(i);

      cont.appendChild(div);
    });
  }

  document.getElementById("carritoBtn").innerText="🛒 ("+carrito.length+")";
}

window.eliminar = (i)=>{
  carrito.splice(i,1);
  renderCarrito();
}

window.toggleCarrito = ()=>{
  document.getElementById("carrito").classList.toggle("active");
}

window.enviarPedido=()=>{
  let txt="Hola quiero:\n";
  carrito.forEach(p=>txt+=p.nombre+"\n");
  window.open("https://wa.me/573187446036?text="+encodeURIComponent(txt));
}

/* RESEÑAS */
window.agregarReseña=async ()=>{
  await addDoc(collection(db,"reseñas"),{
    nombre:nombreReseña.value,
    texto:textoReseña.value
  });
}

onSnapshot(collection(db,"reseñas"),(snap)=>{
  let cont=document.getElementById("listaReseñas");
  cont.innerHTML="";
  snap.forEach(doc=>{
    let r=doc.data();
    cont.innerHTML+=`<div class="res"><b>${r.nombre}</b><br>${r.texto}</div>`;
  });
});

/* ZOOM */
window.verImagen=(url)=>{
  let w=window.open("");
  w.document.write("<img src='"+url+"' style='width:100%'>");
}

</script>

</body>
</html>
