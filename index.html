<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

header{
  background:#111827;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

/* ADMIN */
#admin{
  display:none;
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

/* NEQUI */
#nequi{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* PRODUCTOS */
.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.info{padding:10px;}

.precio{
  color:#b12704;
  font-weight:bold;
}

/* BOTONES */
button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:#f59e0b;}
.wa{background:#25d366;color:white;}

/* CARRITO */
#carrito{
  position:fixed;
  right:20px;
  bottom:90px;
  width:280px;
  background:white;
  padding:10px;
  border-radius:10px;
  display:none;
  max-height:350px;
  overflow:auto;
}

/* BOTÓN CARRITO */
#cartBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#f59e0b;
  font-size:26px;
}

/* WHATSAPP */
.wa{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modal img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<!-- ADMIN -->
<div id="admin">

  <h3>🛠 Admin</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input type="file" id="img">

  <button onclick="agregar()">Agregar producto</button>
</div>

<!-- NEQUI (VISIBLE EN CLIENTE Y ADMIN) -->
<div id="nequi">
  <h3>💳 Nequi</h3>
  <p>318 744 6036</p>
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito"></div>

<button id="cartBtn" onclick="toggleCarrito()">🛒</button>

<!-- WHATSAPP -->
<a class="wa" href="https://wa.me/573187446036">💬</a>

<!-- MODAL -->
<div id="modal" onclick="cerrar()">
  <img id="imgBig">
</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = [];

/* ADMIN SOLO */
if(new URLSearchParams(location.search).get("admin")==="1234"){
  document.getElementById("admin").style.display="block";
}

/* AGREGAR PRODUCTO */
function agregar(){

  let file = document.getElementById("img").files[0];

  if(!file){
    alert("Selecciona imagen");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){

    productos.push({
      nombre:nombre.value,
      precio:precio.value,
      img:e.target.result
    });

    localStorage.setItem("productos",JSON.stringify(productos));
    render();
  };

  reader.readAsDataURL(file);
}

/* AGREGAR AL CARRITO */
function agregarCarrito(i){

  let p = productos[i];

  let existe = carrito.find(x => x.nombre === p.nombre);

  if(existe){
    existe.cantidad++;
  }else{
    carrito.push({...p, cantidad:1});
  }

  actualizar();
}

/* ACTUALIZAR CARRITO */
function actualizar(){

  let c = document.getElementById("carrito");
  c.innerHTML = "<h3>🛒 Carrito</h3>";

  let total = 0;

  carrito.forEach((p,i)=>{

    total += p.precio * p.cantidad;

    c.innerHTML += `
      <div style="border-bottom:1px solid #eee;padding:5px;">
        <b>${p.nombre}</b><br>
        $${p.precio} x ${p.cantidad}

        <div style="display:flex;gap:5px;margin-top:5px;">

          <button onclick="restar(${i})" style="width:50%;background:#ddd;">
            ➖
          </button>

          <button onclick="eliminar(${i})" style="width:50%;background:#ff4d4d;color:white;">
            🗑
          </button>

        </div>
      </div>
    `;
  });

  c.innerHTML += `<p><b>Total: $${total}</b></p>`;
  c.innerHTML += `<button onclick="comprar()">Finalizar compra</button>`;
}

/* RESTAR */
function restar(i){

  carrito[i].cantidad--;

  if(carrito[i].cantidad<=0){
    carrito.splice(i,1);
  }

  actualizar();
}

/* ELIMINAR */
function eliminar(i){
  carrito.splice(i,1);
  actualizar();
}

/* COMPRA */
function comprar(){

  let total = 0;

  carrito.forEach(p=>{
    total += p.precio * p.cantidad;
  });

  window.open("https://wa.me/573187446036?text=Total%20pedido:%20"+total);
}

/* TOGGLE CARRITO */
function toggleCarrito(){
  let c = document.getElementById("carrito");
  c.style.display = (c.style.display==="block")?"none":"block";
  actualizar();
}

/* ZOOM IMAGEN */
function ver(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgBig").src=src;
}

function cerrar(){
  document.getElementById("modal").style.display="none";
}

/* RENDER */
function render(){

  let cont = document.getElementById("lista");
  cont.innerHTML="";

  productos.forEach((p,i)=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}" onclick="ver('${p.img}')">

        <div class="info">
          <b>${p.nombre}</b>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick="agregarCarrito(${i})">
            Agregar
          </button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text='+encodeURIComponent('Quiero '+p.nombre))">
            WhatsApp
          </button>
        </div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
