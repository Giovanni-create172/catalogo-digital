<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef1f5;
}

header{
  background:#131921;
  color:white;
  text-align:center;
  padding:12px;
}

/* BUSCADOR */
.busqueda{
  text-align:center;
  padding:10px;
}

.busqueda input,
.busqueda select{
  width:80%;
  padding:10px;
  margin:5px 0;
}

/* PRODUCTOS */
.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.producto img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:10px;
}

.precio{color:#b12704;font-weight:bold;}

button{
  width:100%;
  padding:8px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:#ff9900;}
.wa{background:#25d366;color:white;}

/* ADMIN */
#adminPanel{
  display:none;
  background:white;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

/* CARRITO */
#carrito{
  position:fixed;
  right:20px;
  bottom:90px;
  width:250px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* BOTÓN */
#cartBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9900;
  font-size:24px;
}

/* EXPORT / IMPORT */
.tools{
  text-align:center;
  margin:10px;
}

.tools button{
  width:80%;
  margin:5px;
  background:#444;
  color:white;
}
</style>
</head>

<body>

<header>
  Encanto Ventas Pasto
</header>

<!-- ADMIN -->
<div id="adminPanel">

  <h3>Panel Admin</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="img" placeholder="Imagen">
  <input id="stock" placeholder="Stock">

  <button onclick="agregarProducto()">Agregar</button>

  <hr>

  <div class="tools">
    <button onclick="exportarCatalogo()">📤 Exportar catálogo</button>
    <input type="file" onchange="importarCatalogo(event)">
  </div>

  <div id="listaAdmin"></div>
</div>

<!-- BUSCADOR -->
<div class="busqueda">
  <input id="search" onkeyup="render()" placeholder="Buscar">
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito">
  <div id="listaCarrito"></div>
  <p id="total"></p>
</div>

<button id="cartBtn" onclick="toggleCarrito()">🛒</button>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];

let carrito = [];

/* ADMIN */
const esAdmin = new URLSearchParams(window.location.search).get("admin") === "1234";
if(esAdmin) document.getElementById("adminPanel").style.display = "block";

/* GUARDAR */
function guardar(){
  localStorage.setItem("productos", JSON.stringify(productos));
}

/* AGREGAR */
function agregarProducto(){
  productos.push({
    nombre:nombre.value,
    precio:precio.value,
    img:img.value,
    stock:parseInt(stock.value || 1)
  });

  guardar();
  render();
}

/* EXPORTAR */
function exportarCatalogo(){

  let data = JSON.stringify(productos);

  let blob = new Blob([data], {type:"application/json"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "catalogo.json";
  a.click();
}

/* IMPORTAR */
function importarCatalogo(e){

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(event){

    productos = JSON.parse(event.target.result);
    guardar();
    render();
  };

  reader.readAsText(file);
}

/* CARRITO */
function agregarCarrito(i){

  let p = productos[i];

  if(p.stock <= 0){
    alert("Sin stock");
    return;
  }

  carrito.push(p);

  p.stock--;
  guardar();

  render();
}

/* WHATSAPP */
function enviarWhatsApp(){

  let mensaje = "Pedido%0A";

  carrito.forEach(p=>{
    mensaje += p.nombre + "%0A";
  });

  window.open("https://wa.me/573187446036?text=" + mensaje);
}

/* RENDER */
function render(){

  let cont = document.getElementById("lista");
  cont.innerHTML = "";

  productos.forEach((p,i)=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}">
        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick="agregarCarrito(${i})">
            Agregar
          </button>
        </div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
