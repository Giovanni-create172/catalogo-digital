<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef1f5;
}

header{
  background:#131921;
  color:white;
  text-align:center;
  padding:12px;
}

/* BUSCADOR */
.busqueda{
  text-align:center;
  padding:10px;
}

.busqueda input,
.busqueda select{
  width:80%;
  padding:10px;
  margin:5px 0;
}

/* PRODUCTOS */
.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.producto img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{padding:10px;}

.precio{color:#b12704;font-weight:bold;}

button{
  width:100%;
  padding:8px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:#ff9900;}
.wa{background:#25d366;color:white;}

/* ADMIN */
#adminPanel{
  display:none;
  background:white;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

.admin-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

/* CARRITO */
#carrito{
  position:fixed;
  right:20px;
  bottom:90px;
  width:250px;
  background:white;
  padding:10px;
}

/* BOTÓN */
#cartBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9900;
  font-size:24px;
}

/* WHATSAPP */
.flotante-wa{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25d366;
  border-radius:50%;
}
</style>
</head>

<body>

<header>
  Encanto Ventas Pasto
</header>

<!-- ADMIN -->
<div id="adminPanel">

  <h3>Admin</h3>

  <button onclick="verPedidos()">Ver pedidos</button>

  <hr>

  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="img" placeholder="Imagen">
  <input id="stock" placeholder="Stock">

  <button onclick="agregarProducto()">Agregar</button>

  <div id="listaAdmin"></div>

  <div id="pedidos"></div>
</div>

<!-- BUSCADOR -->
<div class="busqueda">
  <input id="search" onkeyup="render()" placeholder="Buscar">
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito">
  <div id="listaCarrito"></div>
  <p id="total"></p>

  <button onclick="finalizarCompra()" style="background:#25d366;color:white;">
    Finalizar compra
  </button>
</div>

<button id="cartBtn" onclick="toggleCarrito()">🛒</button>

<a class="flotante-wa" href="https://wa.me/573187446036"></a>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];
let carrito = [];
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

/* ADMIN */
const esAdmin = new URLSearchParams(window.location.search).get("admin") === "1234";
if(esAdmin) document.getElementById("adminPanel").style.display = "block";

/* GUARDAR */
function guardar(){
  localStorage.setItem("productos", JSON.stringify(productos));
}

/* PEDIDOS */
function guardarPedidos(){
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

/* AGREGAR */
function agregarProducto(){
  productos.push({
    nombre:nombre.value,
    precio:precio.value,
    img:img.value,
    stock:parseInt(stock.value)
  });

  guardar();
  render();
}

/* CARRITO */
function agregarCarrito(i){

  let p = productos[i];

  if(p.stock <= 0){
    alert("Sin stock");
    return;
  }

  carrito.push({...p, cantidad:1});
  p.stock--;

  actualizar();
}

/* FINALIZAR */
function finalizarCompra(){

  if(carrito.length === 0) return;

  let nombreCliente = prompt("Nombre:");

  let total = 0;
  let mensaje = "🧾 PEDIDO%0A";

  carrito.forEach(p=>{
    total += p.precio;
    mensaje += p.nombre + "%0A";
  });

  pedidos.push({
    cliente:nombreCliente,
    total:total,
    fecha:new Date().toLocaleString()
  });

  guardarPedidos();

  window.open("https://wa.me/573187446036?text=" + mensaje);
}

/* VER PEDIDOS */
function verPedidos(){

  let div = document.getElementById("pedidos");
  div.innerHTML = "<h4>Pedidos</h4>";

  pedidos.forEach(p=>{
    div.innerHTML += `
      <div>
        ${p.cliente} - $${p.total} - ${p.fecha}
      </div>
    `;
  });
}

/* RENDER */
function render(){

  let cont = document.getElementById("lista");
  cont.innerHTML = "";

  productos.forEach((p,i)=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}">
        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick="agregarCarrito(${i})">
            Agregar
          </button>
        </div>
      </div>
    `;
  });
}

/* ACTUALIZAR */
function actualizar(){
  render();
}

render();

</script>

</body>
</html>
