<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111827;color:white;text-align:center;padding:15px;font-weight:bold;}

#buscador{
  margin:10px;
  padding:10px;
  width:calc(100% - 40px);
  border-radius:8px;
  border:1px solid #ccc;
}

.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.info{padding:10px;}
.precio{color:#b12704;font-weight:bold;}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
}

.add{background:#f59e0b;}
.wa{background:#25d366;color:white;}
.del{background:#ef4444;color:white;}

#carritoBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  color:white;
  padding:10px;
  border-radius:20px;
}

#carrito{
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
}

#carrito.active{right:0;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<input id="buscador" placeholder="🔍 Buscar producto..." onkeyup="filtrar()">

<div id="carritoBtn" onclick="toggleCarrito()">🛒 (0)</div>

<div id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h3>Carrito</h3>
  <div id="items"></div>
  <button class="wa" onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<div class="contenedor" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy",
  authDomain:"catalogo-digital-4a956.firebaseapp.com",
  projectId:"catalogo-digital-4a956"
});

const db = getFirestore(app);

let productos=[];
let carrito=[];

onSnapshot(collection(db,"productos"),(snap)=>{
  productos=[];
  snap.forEach(doc=>productos.push(doc.data()));
  mostrar(productos);
});

function mostrar(lista){
  let cont=document.getElementById("lista");
  cont.innerHTML="";

  lista.forEach(p=>{
    cont.innerHTML+=`
      <div class="producto">
        <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
        <div class="info">
          <b>${p.nombre}</b>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">
          WhatsApp</button>
        </div>
      </div>
    `;
  });
}

window.filtrar=()=>{
  let texto=document.getElementById("buscador").value.toLowerCase();
  let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto));
  mostrar(filtrados);
}

/* carrito */
window.agregarCarrito=(p)=>{
  carrito.push(p);
  render();
}

function render(){
  let c=document.getElementById("items");
  c.innerHTML="";

  carrito.forEach((p,i)=>{
    c.innerHTML+=`
      <p>${p.nombre} - $${p.precio}</p>
      <button class="del" onclick="eliminar(${i})">Quitar</button>
    `;
  });

  document.getElementById("carritoBtn").innerText="🛒 ("+carrito.length+")";
}

window.eliminar=(i)=>{
  carrito.splice(i,1);
  render();
}

window.toggleCarrito=()=>{
  document.getElementById("carrito").classList.toggle("active");
}

window.enviarPedido=()=>{
  let txt="Hola quiero:\n";
  carrito.forEach(p=>txt+=p.nombre+"\n");
  window.open("https://wa.me/573187446036?text="+encodeURIComponent(txt));
}

window.verImagen=(url)=>{
  let w=window.open("");
  w.document.write("<img src='"+url+"' style='width:100%'>");
}

</script>

</body>
</html>
