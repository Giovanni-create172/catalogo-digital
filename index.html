 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111827;color:white;text-align:center;padding:15px;font-weight:bold;}

#admin{display:none;background:white;margin:10px;padding:10px;border-radius:10px;}
#nequi{background:white;margin:10px;padding:10px;border-radius:10px;text-align:center;}

.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.producto img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.info{padding:10px;}
.precio{color:#b12704;font-weight:bold;}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.wa{background:#25d366;color:white;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<div id="admin">
  <h3>🛠 Admin</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="imagen" placeholder="Pega URL de la imagen">
  <button onclick="agregar()">Agregar producto</button>
</div>

<div id="nequi">
  <h3>💳 Nequi</h3>
  <p>3187446036</p>
</div>

<div class="contenedor" id="lista"></div>

<a style="position:fixed;right:20px;bottom:20px;width:60px;height:60px;
background:#25d366;border-radius:50%;display:flex;justify-content:center;
align-items:center;font-size:26px;color:white;text-decoration:none;"
href="https://wa.me/573187446036">💬</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC23m8avf3Z",
  authDomain: "catalogo-digital-4a956.firebaseapp.com",
  projectId: "catalogo-digital-4a956",
  storageBucket: "catalogo-digital-4a956.appspot.com",
  messagingSenderId: "78408824293",
  appId: "1:78408824293:web:4aafa762fc4e9e5267eb0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ADMIN */
const esAdmin = new URLSearchParams(location.search).get("admin")==="1234";
if(esAdmin){
  document.getElementById("admin").style.display="block";
}

/* AGREGAR */
async function agregar(){

  if(!imagen.value){
    alert("Pega una URL de imagen");
    return;
  }

  await addDoc(collection(db,"productos"),{
    nombre:nombre.value,
    precio:precio.value,
    imagen:imagen.value
  });
}

/* MOSTRAR */
onSnapshot(collection(db,"productos"),(snapshot)=>{

  let cont = document.getElementById("lista");
  cont.innerHTML="";

  snapshot.forEach(doc=>{

    let p = doc.data();

    cont.innerHTML+=`
      <div class="producto">
        <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
        <div class="info">
          <b>${p.nombre}</b>
          <p class="precio">$${p.precio}</p>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">
            WhatsApp
          </button>
        </div>
      </div>
    `;
  });

});

window.agregar = agregar;

</script>

<!-- 🔥 ZOOM IMAGEN -->
<script>
function verImagen(url){
  let ventana = window.open("");
  ventana.document.write("<img src='"+url+"' style='width:100%'>");
}
</script>

</body>
</html>
