<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f1f5f9;}

header{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:18px;
}

/* BUSCADOR */
#buscador{
  margin:15px;
  padding:12px;
  width:calc(100% - 40px);
  border-radius:10px;
  border:none;
}

/* CATEGORÍAS */
#categorias{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.cat{padding:8px 14px;background:white;border-radius:20px;cursor:pointer;}
.cat.activa{background:#0f172a;color:white;}

/* GRID */
.contenedor{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  padding:15px;
}

/* CARD */
.producto{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:12px;}
.precio{color:#dc2626;font-weight:bold;font-size:18px;}
.detalle{font-size:13px;color:#64748b;}

.stock{
  font-size:13px;
  font-weight:bold;
  color:#16a34a;
}

/* BOTONES */
button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.add{background:#f59e0b;color:white;}
.wa{background:#22c55e;color:white;}
.del{background:#ef4444;color:white;}

/* CARRITO */
#carritoBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f172a;
  color:white;
  padding:12px;
  border-radius:25px;
}

#carrito{
  position:fixed;
  right:-100%;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
  overflow:auto;
}
#carrito.active{right:0;}

/* ADMIN */
#admin{
  display:none;
  background:white;
  margin:15px;
  padding:12px;
  border-radius:12px;
}
#admin input{width:100%;margin:5px 0;padding:8px;}

/* MODAL IMAGEN */
#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* RESEÑAS */
#reseñas{background:white;margin:20px;padding:15px;border-radius:12px;}
.res{border-bottom:1px solid #eee;padding:8px 0;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<input id="buscador" placeholder="🔍 Buscar producto..." onkeyup="filtrar()">

<div id="categorias"></div>

<!-- ADMIN -->
<div id="admin">
  <h3>Admin</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="imagen" placeholder="URL imagen">
  <input id="descripcion" placeholder="Descripción">
  <input id="talla" placeholder="Talla">
  <input id="color" placeholder="Color">
  <input id="categoria" placeholder="Categoría">
  <input id="stock" placeholder="Stock">
  <button onclick="agregar()">Agregar producto</button>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒 (0)</div>

<div id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h3>Carrito</h3>
  <div id="items"></div>
  <button class="wa" onclick="enviarPedido()">Enviar pedido</button>
</div>

<div class="contenedor" id="lista"></div>

<!-- MODAL -->
<div id="modal" onclick="cerrarModal()">
  <img id="imgModal">
</div>

<!-- RESEÑAS -->
<div id="reseñas">
  <h3>⭐ Opiniones</h3>
  <div id="listaReseñas"></div>
  <input id="nombreReseña">
  <input id="textoReseña">
  <button onclick="agregarReseña()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy",
  authDomain:"catalogo-digital-4a956.firebaseapp.com",
  projectId:"catalogo-digital-4a956"
});

const db = getFirestore(app);

let productos=[];
let carrito=[];
let categoriaActiva="";

/* ADMIN */
if(new URLSearchParams(location.search).get("admin")==="1234"){
  admin.style.display="block";
}

/* AGREGAR */
window.agregar=async()=>{
  await addDoc(collection(db,"productos"),{
    nombre:nombre.value,
    precio:precio.value,
    imagen:imagen.value,
    descripcion:descripcion.value,
    talla:talla.value,
    color:color.value,
    categoria:categoria.value,
    stock:stock.value
  });
}

/* CARGAR */
onSnapshot(collection(db,"productos"),(snap)=>{
  productos=[];
  let cats=new Set();

  snap.forEach(doc=>{
    let p=doc.data();
    productos.push(p);
    if(p.categoria) cats.add(p.categoria);
  });

  crearCategorias([...cats]);
  mostrar(productos);
});

function crearCategorias(lista){
  categorias.innerHTML=`<div class="cat activa" onclick="filtrarCategoria('')">Todos</div>`;
  lista.forEach(c=>{
    categorias.innerHTML+=`<div class="cat" onclick="filtrarCategoria('${c}')">${c}</div>`;
  });
}

function mostrar(lista){
  lista.forEach(p=>{
    listaHTML.innerHTML+=`
    `;
  });

  lista.innerHTML="";
  lista.forEach(p=>{
    document.getElementById("lista").innerHTML+=`
      <div class="producto">
        <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
        <div class="info">
          <b>${p.nombre}</b>
          <p class="precio">$${p.precio}</p>
          <p class="detalle">${p.descripcion||""}</p>
          <p class="stock">Stock: ${p.stock||0}</p>

          <button class="add" onclick='agregarCarrito(${JSON.stringify(p)})'>Agregar</button>
          <button class="wa" onclick="window.open('https://wa.me/573187446036?text=Quiero ${p.nombre}')">WhatsApp</button>
        </div>
      </div>
    `;
  });
}

/* MODAL IMAGEN */
window.verImagen=(url)=>{
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgModal").src=url;
}
window.cerrarModal=()=>{
  document.getElementById("modal").style.display="none";
}

/* FILTRO */
window.filtrar=()=>{
  let t=buscador.value.toLowerCase();
  let f=productos.filter(p=>p.nombre.toLowerCase().includes(t));
  if(categoriaActiva){
    f=f.filter(p=>p.categoria===categoriaActiva);
  }
  document.getElementById("lista").innerHTML="";
  mostrar(f);
}

window.filtrarCategoria=(cat)=>{
  categoriaActiva=cat;
  filtrar();
}

/* CARRITO */
window.agregarCarrito=(p)=>{
  if(p.stock<=0){alert("Sin stock");return;}
  p.stock--;
  carrito.push(p);
  renderCarrito();
  document.getElementById("carrito").classList.add("active");
}

function renderCarrito(){
  let cont=document.getElementById("items");
  cont.innerHTML="";
  carrito.forEach((p,i)=>{
    let d=document.createElement("div");
    d.innerHTML=`<p>${p.nombre}</p><button class="del">Quitar</button>`;
    d.querySelector("button").onclick=()=>eliminar(i);
    cont.appendChild(d);
  });
  carritoBtn.innerText="🛒 ("+carrito.length+")";
}

window.eliminar=(i)=>{
  carrito.splice(i,1);
  renderCarrito();
}

window.toggleCarrito=()=>{
  carrito.classList.toggle("active");
}

window.enviarPedido=()=>{
  let txt="Hola quiero:\n";
  carrito.forEach(p=>txt+=p.nombre+"\n");
  window.open("https://wa.me/573187446036?text="+encodeURIComponent(txt));
}

/* RESEÑAS */
window.agregarReseña=async()=>{
  await addDoc(collection(db,"reseñas"),{
    nombre:nombreReseña.value,
    texto:textoReseña.value
  });
}

onSnapshot(collection(db,"reseñas"),(snap)=>{
  listaReseñas.innerHTML="";
  snap.forEach(doc=>{
    let r=doc.data();
    listaReseñas.innerHTML+=`<div class="res"><b>${r.nombre}</b><br>${r.texto}</div>`;
  });
});

</script>

</body>
</html>
