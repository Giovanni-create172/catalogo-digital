<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto PRO</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

/* HEADER */
header {
  background:#131921;
  color:white;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
}

header h1 { font-size:18px; }

/* GRID PRODUCTOS */
.contenedor {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD TIPO AMAZON */
.producto {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  padding-bottom:10px;
}

.producto img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.info { padding:10px; }

.precio {
  color:#b12704;
  font-weight:bold;
}

/* BOTONES */
button {
  width:100%;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

.add {
  background:#ff9900;
}

.whatsapp {
  background:#25d366;
  color:white;
}

/* CANTIDAD */
input.cantidad {
  width:100%;
  padding:6px;
  margin-top:5px;
}

/* CARRITO */
#carrito {
  position:fixed;
  right:20px;
  bottom:80px;
  width:270px;
  background:white;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  padding:10px;
  display:none;
  z-index:1000;
}

.item {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:5px 0;
}

.eliminar {
  background:red;
  color:white;
  border:none;
  padding:2px 6px;
  border-radius:5px;
}

/* BOTÓN CARRITO CON CONTADOR */
#cartBtn {
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9900;
  font-size:24px;
  border:none;
}

/* BADGE */
#badge {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Encanto Ventas PRO</h1>
</header>

<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <p id="total"></p>
  <button class="whatsapp" onclick="enviar()">Enviar pedido</button>
</div>

<!-- BOTÓN CARRITO -->
<button id="cartBtn" onclick="toggleCarrito()">
🛒
<span id="badge">0</span>
</button>

<script>
let carrito = [];

let productos = [
  {nombre:"Producto demo", precio:10000},
  {nombre:"Producto 2", precio:20000}
];

function render() {
  let cont = document.getElementById("lista");
  cont.innerHTML = "";

  productos.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="producto">
        <img src="https://via.placeholder.com/300">

        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <input type="number" min="1" value="1" id="qty${i}" class="cantidad">

          <button class="add" onclick="agregar(${i})">
            Agregar al carrito
          </button>
        </div>
      </div>
    `;
  });
}

/* AGREGAR CON CANTIDAD */
function agregar(i) {
  let qty = parseInt(document.getElementById("qty"+i).value);

  carrito.push({
    nombre: productos[i].nombre,
    precio: productos[i].precio,
    cantidad: qty
  });

  actualizar();
}

/* ELIMINAR */
function eliminar(i) {
  carrito.splice(i,1);
  actualizar();
}

/* ACTUALIZAR */
function actualizar() {
  let cont = document.getElementById("items");
  let total = 0;
  let count = 0;

  cont.innerHTML = "";

  carrito.forEach((p,i)=>{
    total += p.precio * p.cantidad;
    count += p.cantidad;

    cont.innerHTML += `
      <div class="item">
        ${p.nombre} x${p.cantidad}
        <button class="eliminar" onclick="eliminar(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total;
  document.getElementById("badge").innerText = count;
}

/* MOSTRAR CARRITO */
function toggleCarrito() {
  let c = document.getElementById("carrito");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* ENVIAR */
function enviar() {
  let texto = "Hola quiero comprar:\n";

  carrito.forEach(p=>{
    texto += `- ${p.nombre} x${p.cantidad} = $${p.precio * p.cantidad}\n`;
  });

  window.open("https://wa.me/573187446036?text="+encodeURIComponent(texto));
}

render();
</script>

</body>
</html>
