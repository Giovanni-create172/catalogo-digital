<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Catálogo</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 { text-align: center; }

    .formulario {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin: auto;
      max-width: 400px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .producto {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .producto img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      color: white;
      background: green;
      cursor: pointer;
    }

    .eliminar {
      background: red;
    }

    /* MODAL IMAGEN */
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Mi Catálogo</h1>

<div class="formulario">
  <input type="text" id="nombre" placeholder="Nombre del producto">
  <input type="number" id="precio" placeholder="Precio">
  <input type="file" id="imagenInput" accept="image/*">
  <button onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="contenedor" id="listaProductos"></div>

<!-- MODAL -->
<div id="modal">
  <img id="imagenGrande">
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC23m8avf3Z2ZTXr4Y6OqJBRFxTQRAbHlk",
    authDomain: "catalogo-digital-4a956.firebaseapp.com",
    projectId: "catalogo-digital-4a956",
    storageBucket: "catalogo-digital-4a956.firebasestorage.app",
    messagingSenderId: "78408824293",
    appId: "1:78408824293:web:4aafa762fc4e9e5267eb0c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const lista = document.getElementById("listaProductos");

  async function guardarProducto() {
    let nombre = document.getElementById("nombre").value;
    let precio = document.getElementById("precio").value;
    let file = document.getElementById("imagenInput").files[0];

    if (!nombre || !precio || !file) {
      alert("Completa todo");
      return;
    }

    let reader = new FileReader();

    reader.onload = async function(e) {
      let imagen = e.target.result;

      await addDoc(collection(db, "productos"), {
        nombre,
        precio,
        imagen
      });

      mostrarProductos();
    };

    reader.readAsDataURL(file);
  }

  async function eliminarProducto(id) {
    await deleteDoc(doc(db, "productos", id));
    mostrarProductos();
  }

  async function mostrarProductos() {
    lista.innerHTML = "";
    const datos = await getDocs(collection(db, "productos"));

    datos.forEach((docu) => {
      let p = docu.data();

      lista.innerHTML += `
        <div class="producto">
          <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
          <h3>${p.nombre}</h3>
          <p>$${p.precio}</p>
          <button onclick="eliminarProducto('${docu.id}')">Eliminar</button>
        </div>
      `;
    });
  }

  function verImagen(src) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imagenGrande").src = src;
  }

  document.getElementById("modal").onclick = function() {
    this.style.display = "none";
  };

  window.guardarProducto = guardarProducto;
  window.eliminarProducto = eliminarProducto;
  window.verImagen = verImagen;

  mostrarProductos();
</script>

</body>
</html>
