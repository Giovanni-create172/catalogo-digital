<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* HEADER */
header {
  background:#131921;
  color:white;
  text-align:center;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

header img {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* BUSCADOR + FILTRO */
.busqueda {
  text-align:center;
  padding:10px;
}

.busqueda input,
.busqueda select {
  width:80%;
  padding:10px;
  margin:5px 0;
}

/* PRODUCTOS */
.contenedor {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.producto img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.info {
  padding:10px;
}

.precio {
  color:#b12704;
  font-weight:bold;
}

/* BOTONES */
button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.add {
  background:#ff9900;
}

.wa {
  background:#25d366;
  color:white;
}

/* CARRITO */
#carrito {
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  display:none;
  z-index:1000;
}

.item {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:5px 0;
}

.eliminar {
  background:red;
  color:white;
  border:none;
  padding:2px 6px;
  border-radius:5px;
}

/* BOTÓN CARRITO */
#cartBtn {
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9900;
  font-size:24px;
  border:none;
}

#badge {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:12px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* WHATSAPP FLOTANTE */
.flotante-wa {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25d366;
  color:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  text-decoration:none;
  z-index:999;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Encanto Ventas Pasto</h1>
</header>

<!-- BUSCADOR + FILTRO -->
<div class="busqueda">
  <input type="text" id="search" placeholder="Buscar productos..." onkeyup="render()">

  <select id="filtro" onchange="render()">
    <option value="">Todas las categorías</option>
    <option>Ropa</option>
    <option>Zapatos</option>
    <option>Tecnología</option>
    <option>Accesorios</option>
  </select>
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- CARRITO -->
<div id="carrito">
  <h3>Carrito</h3>
  <div id="items"></div>
  <p id="total"></p>
  <button class="wa" onclick="enviar()">Enviar pedido</button>
</div>

<!-- BOTÓN CARRITO -->
<button id="cartBtn" onclick="toggleCarrito()">🛒
<span id="badge">0</span>
</button>

<!-- WHATSAPP FLOTANTE -->
<a class="flotante-wa"
href="https://wa.me/573187446036"
target="_blank">💬</a>

<script>

let carrito = [];
let productos = [];

/* CARGAR DESDE GITHUB */
fetch("productos.json")
.then(res => res.json())
.then(data => {
  productos = data;
  render();
});

/* RENDER */
function render() {

  let cont = document.getElementById("lista");
  let search = document.getElementById("search").value.toLowerCase();
  let filtro = document.getElementById("filtro").value;

  cont.innerHTML = "";

  productos
  .filter(p =>
    p.nombre.toLowerCase().includes(search) &&
    (filtro === "" || p.categoria === filtro)
  )
  .forEach((p,i)=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}">

        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button class="add" onclick="agregar(${i})">
            Agregar al carrito
          </button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=' + encodeURIComponent('Hola quiero: ${p.nombre} por $${p.precio}'))">
            WhatsApp
          </button>

        </div>
      </div>
    `;
  });
}

/* CARRITO */
function agregar(i) {
  carrito.push({
    nombre: productos[i].nombre,
    precio: productos[i].precio,
    cantidad: 1
  });

  actualizar();
}

function eliminar(i) {
  carrito.splice(i,1);
  actualizar();
}

function actualizar() {

  let cont = document.getElementById("items");
  let total = 0;
  let count = 0;

  cont.innerHTML = "";

  carrito.forEach((p,i)=>{
    total += p.precio * p.cantidad;
    count += 1;

    cont.innerHTML += `
      <div class="item">
        ${p.nombre}
        <button class="eliminar" onclick="eliminar(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total;
  document.getElementById("badge").innerText = count;
}

/* CARRITO TOGGLE */
function toggleCarrito() {
  let c = document.getElementById("carrito");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* ENVIAR WHATSAPP */
function enviar() {
  let texto = "Hola quiero comprar:\n";

  carrito.forEach(p=>{
    texto += `- ${p.nombre} $${p.precio}\n`;
  });

  window.open("https://wa.me/573187446036?text="+encodeURIComponent(texto));
}

</script>

</body>
</html>
