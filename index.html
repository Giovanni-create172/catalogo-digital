<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f1f5f9;}
header{background:#0f172a;color:white;text-align:center;padding:15px;}

#admin{display:none;background:white;margin:10px;padding:10px;}
#ventas{display:none;background:white;margin:10px;padding:10px;border-radius:10px;}

.total{font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<div id="admin">
<h3>Agregar producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<input id="stock" placeholder="Stock">
<button onclick="agregar()">Agregar</button>
</div>

<div id="ventas">
<h3>📊 Ventas</h3>
<div id="listaVentas"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db=getFirestore(app);

/* ADMIN */
if(new URLSearchParams(location.search).get("admin")==="1234"){
admin.style.display="block";
ventas.style.display="block";
}

/* AGREGAR PRODUCTO */
window.agregar=async()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:precio.value,
imagen:imagen.value,
stock:parseInt(stock.value)||0
});
}

/* 🔥 VER VENTAS */
onSnapshot(collection(db,"ventas"),(snap)=>{
listaVentas.innerHTML="";

snap.forEach(doc=>{
let v=doc.data();

let html=`
<div style="border-bottom:1px solid #ddd;margin-bottom:10px;">
<b>Fecha:</b> ${v.fecha}<br>
<b>Total:</b> $${v.total}<br>
`;

v.productos.forEach(p=>{
html+=`- ${p.nombre} x${p.cantidad}<br>`;
});

html+=`</div>`;

listaVentas.innerHTML+=html;
});
});

</script>

</body>
</html>
