<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f1f5f9;overflow-x:hidden;}
header{
background:#0f172a;color:white;text-align:center;
padding:15px;font-size:20px;
display:flex;justify-content:center;align-items:center;gap:10px;
}
header img{width:40px;height:40px;border-radius:50%;object-fit:cover;}

#buscador{width:95%;margin:10px auto;display:block;padding:12px;border-radius:12px;border:1px solid #ccc;font-size:16px;}

.contenedor{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px;}

.categoriaTitulo{padding:10px;font-weight:bold;font-size:18px;}

.producto{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}
.precio{color:red;font-weight:bold;}

button{width:100%;margin-top:5px;padding:8px;border:none;border-radius:8px;cursor:pointer;}
.add{background:orange;}
.wa{background:green;color:white;}
.agotado{background:gray;color:white;}
.eliminar{background:red;color:white;}

#carritoBtn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:12px;border-radius:25px;}

#carrito{position:fixed;right:-100%;top:0;width:300px;height:100%;background:white;padding:10px;transition:.3s;overflow:auto;}
#carrito.active{right:0;}

.total{font-weight:bold;margin-top:10px;}

#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
#modal img{max-width:90%;max-height:90%;}

#admin{display:none;background:white;margin:10px;padding:10px;border-radius:10px;}

#reseñas{background:white;margin:20px;padding:15px;border-radius:12px;}
.res{border-bottom:1px solid #eee;padding:5px 0;}

/* REDES */
#redes{background:#0f172a;color:white;padding:20px;text-align:center;}
.redBtns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
.redBtns a{padding:10px 15px;border-radius:20px;color:white;text-decoration:none;font-weight:bold;}
.fb{background:#1877f2;}
.ig{background:#e1306c;}
.waBtn{background:#25d366;}
.tk{background:black;}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/Giovanni-create172/catalogo-digital/main/logo.png">
<span>Encanto Ventas Pasto</span>
</header>

<input id="buscador" placeholder="Buscar productos..." onkeyup="filtrar()">

<div id="admin">
<h3>Agregar producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<input id="descripcion" placeholder="Descripción">
<input id="stock" placeholder="Stock">
<input id="categoria" placeholder="Categoría (Ej: Ropa, Zapatos)">
<button onclick="agregar()">Agregar</button>
</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒</div>

<div id="carrito">
<button onclick="toggleCarrito()">Cerrar</button>
<div id="items"></div>
<div class="total" id="total">Total: $0</div>
<button onclick="pagar()">Finalizar compra</button>
</div>

<div id="lista"></div>

<div id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<div id="reseñas">
<h3>⭐ Opiniones</h3>
<div id="listaReseñas"></div>
<input id="nombreReseña" placeholder="Tu nombre">
<input id="textoReseña" placeholder="Comentario">
<button onclick="agregarReseña()">Enviar</button>
</div>

<div id="redes">
<h3>Síguenos</h3>
<div class="redBtns">
<a class="fb" href="https://www.facebook.com/EncantoVentasPasto" target="_blank">Facebook</a>
<a class="ig" href="https://www.instagram.com/EncantoVentasPasto" target="_blank">Instagram</a>
<a class="waBtn" href="https://wa.me/573187446036" target="_blank">WhatsApp</a>
<a class="tk" href="https://www.tiktok.com/@EncantoventasPasto" target="_blank">TikTok</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db = getFirestore(app);

let productos = [];
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

let esAdmin = new URLSearchParams(location.search).get("admin")==="1234";
if(esAdmin) document.getElementById("admin").style.display="block";

window.agregar = async ()=>{
await addDoc(collection(db,"productos"),{
nombre:nombre.value,
precio:Number(precio.value),
imagen:imagen.value,
descripcion:descripcion.value,
stock:Number(stock.value),
categoria:categoria.value || "General"
});
}

window.eliminarProducto = async (id)=>{
if(!confirm("Eliminar producto?")) return;
await deleteDoc(doc(db,"productos",id));
}

onSnapshot(collection(db,"productos"),(snap)=>{
productos = [];
snap.forEach(docu=>{
productos.push({id:docu.id,...docu.data()});
});
mostrar(productos);
renderCarrito();
});

/* MOSTRAR */
function mostrar(listaMostrar){
const cont = document.getElementById("lista");
cont.innerHTML = "";

let grupos = {};
listaMostrar.forEach(p=>{
let cat = p.categoria || "General";
if(!grupos[cat]) grupos[cat]=[];
grupos[cat].push(p);
});

Object.keys(grupos).forEach(cat=>{
cont.innerHTML += `<div class="categoriaTitulo">📦 ${cat}</div><div class="contenedor">`;

grupos[cat].forEach((p,i)=>{
let indexReal = productos.findIndex(x=>x.id===p.id);

let boton = p.stock<=0
? `<button class="agotado">AGOTADO</button>`
: `<button class="add" onclick="agregarCarrito(${indexReal})">Agregar</button>`;

let botonEliminar = esAdmin
? `<button class="eliminar" onclick="eliminarProducto('${p.id}')">Eliminar</button>`
: "";

cont.innerHTML += `
<div class="producto">
<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
<div class="info">
<b>${p.nombre}</b>
<p class="precio">$${p.precio}</p>
<p>${p.descripcion||""}</p>
<p>Stock: ${p.stock}</p>

${boton}
<button class="wa" onclick="whatsapp(${indexReal})">WhatsApp</button>
${botonEliminar}

</div>
</div>`;
});

cont.innerHTML += `</div>`;
});
}

/* BUSCAR */
window.filtrar = ()=>{
let texto = buscador.value.toLowerCase();
mostrar(productos.filter(p =>
(p.nombre||"").toLowerCase().includes(texto) ||
(p.descripcion||"").toLowerCase().includes(texto) ||
(p.categoria||"").toLowerCase().includes(texto)
));
}

/* IMAGEN */
window.verImagen = (url)=>{modal.style.display="flex";imgModal.src = url;}
window.cerrarModal = ()=>modal.style.display="none";

/* CARRITO */
window.agregarCarrito = (i)=>{
let p = productos[i];
if(p.stock<=0) return;

let existe = carrito.find(x=>x.id===p.id);

if(existe){
if(existe.cantidad < p.stock) existe.cantidad++;
else return alert("Sin stock");
}else{
carrito.push({...p,cantidad:1});
}

guardarCarrito();
renderCarrito();
}

function renderCarrito(){
let items = document.getElementById("items");
let total = 0;
items.innerHTML = "";

carrito.forEach((p,i)=>{
total += p.precio * p.cantidad;
items.innerHTML += `
<div>
${p.nombre} x${p.cantidad}
<button onclick="cambiar(${i},-1)">-</button>
<button onclick="cambiar(${i},1)">+</button>
<button onclick="eliminar(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText = "Total: $" + total;
}

function guardarCarrito(){
localStorage.setItem("carrito",JSON.stringify(carrito));
}

window.cambiar = (i,val)=>{
let p = carrito[i];
if(p.cantidad+val<=0) return;
if(p.cantidad+val>p.stock) return alert("Stock máximo");
p.cantidad+=val;
guardarCarrito();
renderCarrito();
}

window.eliminar = (i)=>{
carrito.splice(i,1);
guardarCarrito();
renderCarrito();
}

window.toggleCarrito = ()=>{
document.getElementById("carrito").classList.toggle("active");
}

/* WHATSAPP */
window.whatsapp = (i)=>{
let p = productos[i];
let msg = `Hola 👋\nQuiero este producto:\n\n🛍 ${p.nombre}\n💰 $${p.precio}`;
window.open("https://wa.me/573187446036?text="+encodeURIComponent(msg));
}

/* PAGAR */
window.pagar = async ()=>{
if(carrito.length===0) return alert("Carrito vacío");

let total = document.getElementById("total").innerText;

let msg = "Hola 👋 quiero comprar:\n\n";
carrito.forEach(p=>{
msg += `🛍 ${p.nombre} x${p.cantidad}\n`;
});
msg += "\n"+total+"\n\nPago por Nequi: 3187446036";

await addDoc(collection(db,"ventas"),{
productos:carrito.map(p=>({nombre:p.nombre,cantidad:p.cantidad})),
total:parseFloat(total.replace("Total: $","")),
fecha:new Date().toLocaleString()
});

for(let p of carrito){
await updateDoc(doc(db,"productos",p.id),{
stock: p.stock - p.cantidad
});
}

window.open("https://wa.me/573187446036?text="+encodeURIComponent(msg));

carrito=[];
guardarCarrito();
renderCarrito();
}

/* RESEÑAS */
window.agregarReseña = async ()=>{
await addDoc(collection(db,"reseñas"),{
nombre: nombreReseña.value,
texto: textoReseña.value
});
}

onSnapshot(collection(db,"reseñas"),(snap)=>{
listaReseñas.innerHTML="";
snap.forEach(doc=>{
let r = doc.data();
listaReseñas.innerHTML += `<div class="res"><b>${r.nombre}</b><br>${r.texto}</div>`;
});
});

</script>

</body>
</html>
