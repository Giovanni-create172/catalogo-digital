<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* HEADER */
header {
  background:#131921;
  color:white;
  text-align:center;
  padding:10px;
}

header img {
  width:40px;
  border-radius:50%;
}

/* BUSCADOR + FILTRO */
.busqueda {
  text-align:center;
  padding:10px;
}

.busqueda input,
.busqueda select {
  width:80%;
  padding:10px;
  margin:5px 0;
}

/* PRODUCTOS */
.contenedor {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.producto {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.producto img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.info {
  padding:10px;
}

.precio {
  color:#b12704;
  font-weight:bold;
}

/* BOTONES */
button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:5px;
}

.add { background:#ff9900; }
.wa { background:#25d366; color:white; }

/* CARRITO (simple base) */
#carrito {
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  padding:10px;
  border-radius:10px;
  display:none;
}

#cartBtn {
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9900;
  font-size:24px;
  border:none;
}

.flotante-wa {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25d366;
  color:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  font-size:28px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Encanto Ventas Pasto</h1>
</header>

<!-- ADMIN PANEL (oculto) -->
<div id="adminPanel" style="display:none; padding:10px; background:#fff;">
  <h3>Panel Admin</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input id="img" placeholder="URL imagen">

  <select id="categoria">
    <option>Ropa</option>
    <option>Zapatos</option>
    <option>Tecnología</option>
    <option>Accesorios</option>
  </select>

  <button onclick="agregarProducto()">Agregar producto</button>
</div>

<!-- BUSCADOR -->
<div class="busqueda">
  <input type="text" id="search" placeholder="Buscar..." onkeyup="render()">

  <select id="filtro" onchange="render()">
    <option value="">Todas</option>
    <option>Ropa</option>
    <option>Zapatos</option>
    <option>Tecnología</option>
    <option>Accesorios</option>
  </select>
</div>

<!-- PRODUCTOS -->
<div class="contenedor" id="lista"></div>

<!-- WHATSAPP -->
<a class="flotante-wa"
href="https://wa.me/573187446036"
target="_blank">💬</a>

<script>

let productos = [
  {nombre:"Zapatos Nike", precio:120000, img:"img/zapatos.jpg", categoria:"Zapatos"},
  {nombre:"Camisa Polo", precio:60000, img:"img/camisa.jpg", categoria:"Ropa"}
];

/* ADMIN DETECCIÓN */
const params = new URLSearchParams(window.location.search);
const esAdmin = params.get("admin") === "1234";

if(esAdmin){
  document.getElementById("adminPanel").style.display = "block";
}

/* AGREGAR PRODUCTO */
function agregarProducto(){

  let nombre = document.getElementById("nombre").value;
  let precio = document.getElementById("precio").value;
  let img = document.getElementById("img").value;
  let categoria = document.getElementById("categoria").value;

  productos.push({nombre, precio, img, categoria});

  render();
}

/* RENDER */
function render(){

  let cont = document.getElementById("lista");
  let search = document.getElementById("search").value.toLowerCase();
  let filtro = document.getElementById("filtro").value;

  cont.innerHTML = "";

  productos
  .filter(p =>
    p.nombre.toLowerCase().includes(search) &&
    (filtro === "" || p.categoria === filtro)
  )
  .forEach(p=>{

    cont.innerHTML += `
      <div class="producto">
        <img src="${p.img}">
        <div class="info">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <button class="add">Agregar</button>

          <button class="wa"
          onclick="window.open('https://wa.me/573187446036?text=' + encodeURIComponent('Quiero: ${p.nombre}'))">
            WhatsApp
          </button>
        </div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
