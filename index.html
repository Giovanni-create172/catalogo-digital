<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encanto Ventas Pasto</title>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
header{background:#111;color:#fff;text-align:center;padding:15px;}

.contenedor{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px;}

.producto{background:#fff;border-radius:10px;overflow:hidden;}
.producto img{width:100%;height:200px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}
button{margin-top:5px;width:100%;padding:6px;border:none;border-radius:6px;cursor:pointer;}
.add{background:orange;}
.wa{background:green;color:white;}

#carrito{position:fixed;right:-100%;top:0;width:300px;height:100%;background:#fff;transition:.3s;padding:10px;}
#carrito.active{right:0;}

#carritoBtn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:20px;}

#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
#modal img{max-width:90%;max-height:90%;}

</style>
</head>

<body>

<header>Encanto Ventas Pasto</header>

<div id="carritoBtn" onclick="toggleCarrito()">🛒</div>

<div id="carrito">
<button onclick="toggleCarrito()">Cerrar</button>
<div id="items"></div>
<div id="total">Total: $0</div>
<button onclick="pagar()">Comprar</button>
</div>

<div class="contenedor" id="lista"></div>

<!-- MODAL -->
<div id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSy",
authDomain:"catalogo-digital-4a956.firebaseapp.com",
projectId:"catalogo-digital-4a956"
});

const db=getFirestore(app);

let productos=[];
let carrito=[];

/* CARGAR PRODUCTOS */
onSnapshot(collection(db,"productos"),snap=>{
productos=[];
snap.forEach(d=>{
productos.push({id:d.id,...d.data()});
});
mostrar();
});

/* MOSTRAR PRODUCTOS */
function mostrar(){
const cont=document.getElementById("lista");
cont.innerHTML="";

productos.forEach((p,index)=>{
cont.innerHTML+=`
<div class="producto">
<img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
<div class="info">
<b>${p.nombre}</b>
<p>$${p.precio}</p>
<p>Stock: ${p.stock}</p>

<button class="add" onclick="agregarCarrito(${index})">Agregar</button>
<button class="wa" onclick="comprarWhats(${index})">WhatsApp</button>

</div>
</div>`;
});
}

/* IMAGEN GRANDE */
window.verImagen=(url)=>{
document.getElementById("modal").style.display="flex";
document.getElementById("imgModal").src=url;
}

window.cerrarModal=()=>{
document.getElementById("modal").style.display="none";
}

/* BOTONES */
window.agregarCarrito=(i)=>{
let p=productos[i];
let e=carrito.find(x=>x.id===p.id);

if(e){
if(e.cantidad<p.stock)e.cantidad++;
else return alert("Sin stock");
}else{
carrito.push({...p,cantidad:1});
}
render();
}

window.comprarWhats=(i)=>{
let p=productos[i];
window.open("https://wa.me/573187446036?text=Quiero "+p.nombre);
}

/* CARRITO */
function render(){
let items=document.getElementById("items");
let total=0;
items.innerHTML="";

carrito.forEach((p,i)=>{
total+=p.precio*p.cantidad;

items.innerHTML+=`
<div>
${p.nombre} x${p.cantidad}
<button onclick="cambiar(${i},-1)">-</button>
<button onclick="cambiar(${i},1)">+</button>
<button onclick="eliminar(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
}

window.cambiar=(i,v)=>{
let p=carrito[i];
if(p.cantidad+v<=0)return;
if(p.cantidad+v>p.stock)return alert("Sin stock");
p.cantidad+=v;
render();
}

window.eliminar=i=>{
carrito.splice(i,1);
render();
}

window.toggleCarrito=()=>{
document.getElementById("carrito").classList.toggle("active");
}

/* PAGAR */
window.pagar=async()=>{
if(carrito.length===0)return;

await addDoc(collection(db,"ventas"),{
productos:carrito.map(p=>({nombre:p.nombre,cantidad:p.cantidad})),
total:parseFloat(document.getElementById("total").innerText.replace("Total: $","")),
fecha:new Date().toLocaleString()
});

for(let p of carrito){
await updateDoc(doc(db,"productos",p.id),{
stock:p.stock-p.cantidad
});
}

window.open("https://wa.me/573187446036?text=Pedido realizado");

carrito=[];
render();
}

</script>

</body>
</html>
